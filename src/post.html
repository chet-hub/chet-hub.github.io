<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- build:js -->
    <script src="js/app.js"></script>
    <script src="js/mustache.min.js"></script>
    <script src="js/marked.min.js"></script>
    <!-- endbuild -->
    <!-- build:css -->
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="font-awesome/css/font-awesome.css"/>
    <link rel="stylesheet" href="css/style.css"/>
    <!-- endbuild -->
    <link rel="icon" type="image/png" href="images/header.jpg" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/e69bc3937e.js" crossorigin="anonymous"></script>
    <title>Simplest - Post</title>
</head>

<body>

<div class="header">
    <img src="images/header.jpg">
    <p class="name">Chet</p>
    <p class="description">Log something in my mind.</p>
</div>
<div class="menu stickyTop">
    <a href="index.html">Home</a>
    <a href="posts.html">Posts</a>
    <a href="post.html#post/about_me.md">About</a>
    <a href="contact.html">Contact</a>
</div>


<script id="template_post" type="x-tmpl-mustache">
  {{#posts}}
      <div class="post widthController">
        <p class="title">
          {{title}}
        </p>
        <p class="description">
          {{author}} / {{date}}
        </p>
        <!-- <img src="{{image}}" alt="" srcset=""> -->
        <!-- <p class='summary'>
          {{summary}}
        </p> -->
      </div>
  {{/posts}}

</script>
<style>
    .post {
        border-bottom: 0px solid white;
        margin-bottom: 0px;
    }
</style>
<div id="postHeader" class='md widthController'></div>
<div id="target_post" class='md widthController'></div>


<div id="disqus_thread" class="comment widthController"></div>
